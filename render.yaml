services:
  - type: web
    name: vulnscope
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PRIVATE_KEY_SEED
        sync: false          # set manually in Render dashboard — never commit the value
      - key: GITHUB_TOKEN
        sync: false          # optional; raises GitHub rate limit to 5 000 req/hr
